<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- 背景光晕 -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbd38d" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- 光晕 -->
  <circle cx="60" cy="60" r="60" fill="url(#glow)" />

  <!-- 外圈装饰 - 云雷纹 -->
  <circle cx="60" cy="60" r="45" stroke="url(#rimGrad)" stroke-width="1.5" opacity="0.3" />
  
  <!-- 镜身外圈 -->
  <circle cx="60" cy="60" r="38" stroke="url(#rimGrad)" stroke-width="2.5" />
  
  <!-- 镜身内圈 -->
  <circle cx="60" cy="60" r="34" stroke="url(#rimGrad)" stroke-width="0.8" opacity="0.5" />
  
  <!-- 镜面 -->
  <circle cx="60" cy="60" r="30" fill="url(#innerGrad)" stroke="url(#rimGrad)" stroke-width="0.5" opacity="0.6" />

  <!-- 镜钮 -->
  <circle cx="60" cy="60" r="6" stroke="url(#rimGrad)" stroke-width="1.5" opacity="0.7" />
  <circle cx="60" cy="60" r="2.5" fill="#fbbf24" opacity="0.5" />

  <!-- 外圈装饰点 -->
  <circle cx="60" cy="16" r="1.5" fill="#f97316" opacity="0.4" />
  <circle cx="60" cy="104" r="1.5" fill="#f97316" opacity="0.4" />
  <circle cx="16" cy="60" r="1.5" fill="#f97316" opacity="0.4" />
  <circle cx="104" cy="60" r="1.5" fill="#f97316" opacity="0.4" />

  <!-- 微光反射 -->
  <ellipse cx="50" cy="48" rx="10" ry="6" fill="#fbd38d" opacity="0.06" transform="rotate(-20 50 48)" />
</svg>
